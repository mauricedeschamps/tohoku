<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>An invitation to depth road of north Japan</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2f">
  <meta name="description" content="Explore Tohoku's top attractions, festivals, and hot springs. PWA app with maps and multi-language support.">
  <link rel="icon" type="image/jpeg" href="icons/icon-192.jpg">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    }

    :root {
      --bg: #121212;
      --surface: #1e1e2f;
      --card: #2a2a3b;
      --text: #eeeeee;
      --text-secondary: #bbbbbb;
      --border: #3a3a4a;
      --primary: #5a9eff;
      --primary-hover: #3f7ed0;
      --sponsor-bg: #2a2a2a;
    }

    body.light {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --card: #e9ecef;
      --text: #1e1e2a;
      --text-secondary: #4a5568;
      --border: #cbd5e0;
      --primary: #2b6cb0;
      --primary-hover: #2c5282;
      --sponsor-bg: #edf2f7;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    .app-header, .app-footer {
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
    }

    .app-footer {
      border-top: 1px solid var(--border);
      border-bottom: none;
      text-align: center;
      font-size: 0.9rem;
      margin-top: 2rem;
    }

    .app-footer a {
      color: var(--primary);
      text-decoration: none;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    button, .lang-btn {
      background-color: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }

    button:hover, .lang-btn:hover {
      background-color: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .lang-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    .map-wrapper {
      margin: 1.5rem 0;
      border-radius: 1rem;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 280px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .sponsor {
      background-color: var(--sponsor-bg);
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
      border: 1px dashed var(--border);
      font-size: 0.9rem;
    }
    .sponsor p {
      margin: 0.25rem 0;
    }
    .sponsor small {
      color: var(--text-secondary);
    }

    .pref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .pref-card {
      background-color: var(--card);
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .pref-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-color: var(--primary);
    }
    .pref-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .pref-name {
      font-size: 1.3rem;
      font-weight: bold;
    }

    .detail-section {
      margin: 2rem 0;
    }
    .detail-card {
      background-color: var(--card);
      border-radius: 1rem;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .detail-image {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 1rem;
      margin-bottom: 1rem;
      background: #aaa;
    }
    .back-btn {
      background-color: var(--primary);
      color: white;
      border: none;
      margin-bottom: 1rem;
      display: inline-block;
    }
    .back-btn:hover {
      background-color: var(--primary-hover);
    }
    .list-item {
      padding: 0.3rem 0;
      border-bottom: 1px dotted var(--border);
    }
    .official-link {
      display: inline-block;
      margin-top: 0.5rem;
      color: var(--primary);
      word-break: break-all;
    }
    h2, h3 {
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    hr {
      border-color: var(--border);
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="container">
      <div class="flex-between">
        <h1 id="app-title">An invitation to depth road of north Japan</h1>
        <div class="controls">
          <div class="lang-group" id="lang-group"></div>
          <button id="theme-toggle">🌓 Dark/Light</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container" id="main-content"></main>

  <footer class="app-footer">
    <div class="container">
      Contact us<br>
      <a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a>
    </div>
  </footer>

  <script>
    // ---------- 多言語データ（タイトル含む）----------
    const translations = {
      en: {
        appTitle: "An invitation to depth road of north Japan",
        back: "← Back to map",
        attractions: "Attractions",
        festivals: "Festivals",
        hotsprings: "Hot Springs",
        access: "Access Information",
        officialSite: "Official Website",
        sponsorMsg: "🌟 This space is for sponsorship. Later you can add images & official links here.",
        sponsorNote: "Contact us for advertising opportunities."
      },
      it: {
        appTitle: "Un invito alla strada profonda del nord del Giappone",
        back: "← Torna alla mappa",
        attractions: "Attrazioni",
        festivals: "Feste",
        hotsprings: "Sorgenti termali",
        access: "Informazioni accesso",
        officialSite: "Sito ufficiale",
        sponsorMsg: "🌟 Spazio sponsor. In seguito puoi aggiungere immagini e link ufficiali.",
        sponsorNote: "Contattaci per opportunità pubblicitarie."
      },
      ru: {
        appTitle: "Приглашение в глубинную дорогу северной Японии",
        back: "← Назад к карте",
        attractions: "Достопримечательности",
        festivals: "Фестивали",
        hotsprings: "Горячие источники",
        access: "Информация о доступе",
        officialSite: "Официальный сайт",
        sponsorMsg: "🌟 Место для спонсора. Позже можно добавить изображения и официальные ссылки.",
        sponsorNote: "Свяжитесь с нами для рекламы."
      },
      ja: {
        appTitle: "みちのくへのいざない",
        back: "← 地図に戻る",
        attractions: "観光地",
        festivals: "祭り",
        hotsprings: "温泉",
        access: "アクセス情報",
        officialSite: "公式サイト",
        sponsorMsg: "🌟 スポンサー枠（後で画像や公式HPへのリンクを追加可能）",
        sponsorNote: "広告掲載のお問い合わせはこちら"
      }
    };

    // 県データ（前回と同じ、変更なし）
    const prefectures = {
      aomori: {
        name: { en: "Aomori", it: "Aomori", ru: "Аомори", ja: "青森県" },
        attractions: { en: "Lake Towada/Oirase Stream, Shirakami-Sanchi, Hirosaki Castle, Hakkoda Mountains", it: "Lago Towada/Valle Oirase, Shirakami-Sanchi, Castello di Hirosaki, Monti Hakkoda", ru: "Озерова Товада/Ручей Оирасе, Сираками-Санти, Замок Хиросаки, Горы Хаккода", ja: "十和田湖・奥入瀬渓流、白神山地、弘前城、八甲田山" },
        festivals: { en: "Aomori Nebuta Festival (early Aug)", it: "Festa Nebuta di Aomori (inizio agosto)", ru: "Фестиваль Небута в Аомори (начало августа)", ja: "青森ねぶた祭（8月上旬）" },
        hotsprings: { en: "Sukayu Onsen, Asamushi Onsen, Golden Yakushi", it: "Sukayu Onsen, Asamushi Onsen, Golden Yakushi", ru: "Сюкаю Онсэн, Асамуси Онсэн, Голден Якуси", ja: "酸ヶ湯温泉、浅虫温泉、黄金崎不老不死温泉" },
        access: { en: "By Shinkansen from Tokyo to Shin-Aomori (about 3h) then bus.", it: "Shinkansen da Tokyo a Shin-Aomori (3h) poi autobus.", ru: "На синкансэне от Токио до Син-Аомори (3 ч), затем автобус.", ja: "東京から新幹線で新青森まで約3時間、その後バス。" },
        officialUrl: "https://www.aptinet.jp/",
        imgPlaceholder: "https://placehold.co/600x400/2a5a7a/white?text=Aomori"
      },
      iwate: {
        name: { en: "Iwate", it: "Iwate", ru: "Иватэ", ja: "岩手県" },
        attractions: { en: "Chuson-ji, Motsu-ji (Hiraizumi), Geibikei Gorge, Ryusendo Cave", it: "Chuson-ji, Motsu-ji (Hiraizumi), Gola Geibikei, Grotta Ryusendo", ru: "Тюсондзи, Моцудзи (Хираидзуми), Ущелье Гэйбикэй, Пещера Рюсэндо", ja: "中尊寺・毛越寺（平泉）、猊鼻渓、龍泉洞" },
        festivals: { en: "Morioka Sansa Odori (early Aug)", it: "Morioka Sansa Odori (inizio agosto)", ru: "Мориока Санса Одори (начало августа)", ja: "盛岡さんさ踊り（8月上旬）" },
        hotsprings: { en: "Hanamaki Onsenkyo, Hachimantai Onsen", it: "Hanamaki Onsenkyo, Hachimantai Onsen", ru: "Ханамаки Онсэнкё, Хатимантай Онсэн", ja: "花巻温泉郷、八幡平温泉郷" },
        access: { en: "Tohoku Shinkansen Tokyo→Morioka (about 2h 20m)", it: "Tohoku Shinkansen Tokyo→Morioka (2h 20m)", ru: "Синкансэн Тохоку Токио→Мориока (2 ч 20 м)", ja: "東北新幹線で東京→盛岡約2時間20分" },
        officialUrl: "https://www.iwate-tourism.jp/",
        imgPlaceholder: "https://placehold.co/600x400/4a6a4a/white?text=Iwate"
      },
      akita: {
        name: { en: "Akita", it: "Akita", ru: "Акита", ja: "秋田県" },
        attractions: { en: "Kakunodate Samurai District, Lake Tazawa, Oga Peninsula", it: "Quartiere dei samurai Kakunodate, Lago Tazawa, Penisola di Oga", ru: "Район самураев Какунодатэ, Озеро Тадзава, Полуостров Ога", ja: "角館武家屋敷、田沢湖、男鹿半島" },
        festivals: { en: "Akita Kanto Festival (early Aug)", it: "Akita Kanto Festival (inizio agosto)", ru: "Фестиваль Канто в Аките (начало августа)", ja: "秋田竿燈まつり（8月上旬）" },
        hotsprings: { en: "Nyuto Onsenkyo (Tsurunoyu, Tamagawa)", it: "Nyuto Onsenkyo (Tsurunoyu, Tamagawa)", ru: "Нюто Онсэнкё (Цуруною, Тамагава)", ja: "乳頭温泉郷、玉川温泉" },
        access: { en: "Komachi Shinkansen Tokyo→Akita (about 3h 45m)", it: "Shinkansen Komachi Tokyo→Akita (3h 45m)", ru: "Синкансэн Комати Токио→Акита (3 ч 45 м)", ja: "こまち新幹線で東京→秋田約3時間45分" },
        officialUrl: "https://www.akitafan.com/",
        imgPlaceholder: "https://placehold.co/600x400/8a6a4a/white?text=Akita"
      },
      miyagi: {
        name: { en: "Miyagi", it: "Miyagi", ru: "Мияги", ja: "宮城県" },
        attractions: { en: "Matsushima Bay, Sendai Castle Ruins, Akiu Great Falls", it: "Baia di Matsushima, Ruderi del castello di Sendai, Grande cascata Akiu", ru: "Залив Мацусима, Руины замка Сендай, Водопад Акиу", ja: "松島、仙台城跡、秋保大滝" },
        festivals: { en: "Sendai Tanabata Festival (early Aug)", it: "Festa di Tanabata a Sendai (inizio agosto)", ru: "Фестиваль Танабата в Сендае (начало августа)", ja: "仙台七夕まつり（8月上旬）" },
        hotsprings: { en: "Akiu Onsen, Naruko Onsenkyo, Sakunami Onsen", it: "Akiu Onsen, Naruko Onsenkyo, Sakunami Onsen", ru: "Акиу Онсэн, Наруко Онсэнкё, Сакунами Онсэн", ja: "秋保温泉、鳴子温泉郷、作並温泉" },
        access: { en: "Tohoku Shinkansen Tokyo→Sendai (about 1h 30m)", it: "Shinkansen Tohoku Tokyo→Sendai (1h 30m)", ru: "Синкансэн Тохоку Токио→Сендай (1 ч 30 м)", ja: "東北新幹線で東京→仙台約1時間30分" },
        officialUrl: "https://www.miyagi-tourism.jp/",
        imgPlaceholder: "https://placehold.co/600x400/4a6a8a/white?text=Miyagi"
      },
      yamagata: {
        name: { en: "Yamagata", it: "Yamagata", ru: "Ямагата", ja: "山形県" },
        attractions: { en: "Yamadera (Risshaku-ji), Zao Snow Monsters, Mogami River Boat", it: "Yamadera (Risshaku-ji), Mostri di neve Zao, Barca sul fiume Mogami", ru: "Ямадэра (Риссяку-дзи), Зао снежные монстры, Лодка по реке Могами", ja: "山寺（立石寺）、蔵王樹氷、最上川舟下り" },
        festivals: { en: "Yamagata Hanagasa Festival (early Aug)", it: "Yamagata Hanagasa Festival (inizio agosto)", ru: "Фестиваль Ханагаса в Ямагате (начало августа)", ja: "山形花笠まつり（8月上旬）" },
        hotsprings: { en: "Ginzan Onsen, Zao Onsen, Tendo Onsen", it: "Ginzan Onsen, Zao Onsen, Tendo Onsen", ru: "Гиндзан Онсэн, Дзао Онсэн, Тэндо Онсэн", ja: "銀山温泉、蔵王温泉、天童温泉" },
        access: { en: "Yamagata Shinkansen Tokyo→Yamagata (about 2h 40m)", it: "Yamagata Shinkansen Tokyo→Yamagata (2h 40m)", ru: "Синкансэн Ямагата Токио→Ямагата (2 ч 40 м)", ja: "山形新幹線で東京→山形約2時間40分" },
        officialUrl: "https://www.yamagata-yukifu.jp/",
        imgPlaceholder: "https://placehold.co/600x400/6a5a6a/white?text=Yamagata"
      },
      fukushima: {
        name: { en: "Fukushima", it: "Fukushima", ru: "Фукусима", ja: "福島県" },
        attractions: { en: "Tsurugajo Castle, Ouchi-juku, Goshikinuma Ponds, Inawashiro Lake", it: "Castello Tsurugajo, Ouchi-juku, Stagni Goshikinuma, Lago Inawashiro", ru: "Замок Цуругадзё, Оути-дзюку, Пруды Госикинума, Озеро Инавасиро", ja: "鶴ヶ城、大内宿、五色沼、猪苗代湖" },
        festivals: { en: "Fukushima Waraji Matsuri (early Aug)", it: "Fukushima Waraji Matsuri (inizio agosto)", ru: "Фестиваль Варадзи в Фукусиме (начало августа)", ja: "福島わらじまつり（8月上旬）" },
        hotsprings: { en: "Iizaka Onsen, Tsuchiyu Onsen, Higashiyama Onsen", it: "Iizaka Onsen, Tsuchiyu Onsen, Higashiyama Onsen", ru: "Иидзака Онсэн, Цутию Онсэн, Хигасияма Онсэн", ja: "飯坂温泉、土湯温泉、東山温泉" },
        access: { en: "Tohoku Shinkansen Tokyo→Fukushima (about 1h 20m)", it: "Tohoku Shinkansen Tokyo→Fukushima (1h 20m)", ru: "Синкансэн Тохоку Токио→Фукусима (1 ч 20 м)", ja: "東北新幹線で東京→福島約1時間20分" },
        officialUrl: "https://www.tif.ne.jp/",
        imgPlaceholder: "https://placehold.co/600x400/8a6a2a/white?text=Fukushima"
      }
    };

    let currentLang = "en";
    let currentTheme = "dark";
    let currentView = "home";
    let currentPrefId = null;

    function setTheme(theme) {
      currentTheme = theme;
      if (theme === "dark") document.body.classList.remove("light");
      else document.body.classList.add("light");
      localStorage.setItem("theme", theme);
    }

    function toggleTheme() {
      setTheme(currentTheme === "dark" ? "light" : "dark");
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.title = translations[lang].appTitle;
      const titleElem = document.getElementById("app-title");
      if (titleElem) titleElem.innerText = translations[lang].appTitle;
      renderCurrentView();
    }

    function renderCurrentView() {
      if (currentView === "home") renderHome();
      else if (currentView === "detail" && currentPrefId) renderDetail(currentPrefId);
    }

    function renderHome() {
      const t = translations[currentLang];
      let html = `
        <div class="sponsor"><p>✨ ${t.sponsorMsg}</p><small>${t.sponsorNote}</small></div>
        <div class="map-wrapper">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1f503164.72084657604!2d140.4677891333147!3d38.26743625447383!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5f8a2969758f6e89%3A0x12f5f4caf20fea5!2z5a6u5Zyw5biC!5e0!3m2!1sja!2sjp!4v1712842000000!5m2!1sja!2sjp" allowfullscreen loading="lazy"></iframe>
        </div>
        <div class="pref-grid">
      `;
      for (const [id, data] of Object.entries(prefectures)) {
        const displayName = data.name[currentLang] || data.name.en;
        html += `<div class="pref-card" data-pref="${id}"><div class="pref-emoji">🗻</div><div class="pref-name">${displayName}</div></div>`;
      }
      html += `</div><div class="sponsor"><p>✨ ${t.sponsorMsg}</p><small>${t.sponsorNote}</small></div>`;
      document.getElementById("main-content").innerHTML = html;
      document.querySelectorAll(".pref-card").forEach(card => {
        card.addEventListener("click", () => {
          const prefId = card.getAttribute("data-pref");
          if (prefId) { currentView = "detail"; currentPrefId = prefId; renderCurrentView(); window.scrollTo(0,0); }
        });
      });
    }

    function renderDetail(prefId) {
      const pref = prefectures[prefId];
      if (!pref) return;
      const t = translations[currentLang];
      const imgSrc = pref.imgPlaceholder;
      const attractionsText = pref.attractions[currentLang] || pref.attractions.en;
      const festivalsText = pref.festivals[currentLang] || pref.festivals.en;
      const hotspringsText = pref.hotsprings[currentLang] || pref.hotsprings.en;
      const accessText = pref.access[currentLang] || pref.access.en;

      let html = `<button class="back-btn" id="back-home-btn">${t.back}</button>
        <div class="detail-card">
          <img src="${imgSrc}" alt="${pref.name[currentLang]}" class="detail-image">
          <h2>${pref.name[currentLang]}</h2>
          <div class="sponsor"><small>${t.sponsorMsg}</small></div>
          <h3>📌 ${t.attractions}</h3><div class="list-item">${attractionsText}</div>
          <div class="sponsor"><small>${t.sponsorMsg}</small></div>
          <h3>🎎 ${t.festivals}</h3><div class="list-item">${festivalsText}</div>
          <div class="sponsor"><small>${t.sponsorMsg}</small></div>
          <h3>♨️ ${t.hotsprings}</h3><div class="list-item">${hotspringsText}</div>
          <div class="sponsor"><small>${t.sponsorMsg}</small></div>
          <h3>🚗 ${t.access}</h3><div class="list-item">${accessText}</div>
          <h3>🔗 ${t.officialSite}</h3>
          <a href="${pref.officialUrl}" target="_blank" rel="noopener" class="official-link">${pref.officialUrl}</a>
        </div>
        <div class="sponsor"><small>${t.sponsorMsg}</small></div>`;
      document.getElementById("main-content").innerHTML = html;
      document.getElementById("back-home-btn").addEventListener("click", () => {
        currentView = "home";
        currentPrefId = null;
        renderCurrentView();
      });
    }

    function buildLangButtons() {
      const langs = ["en", "it", "ru", "ja"];
      const container = document.getElementById("lang-group");
      if (!container) return;
      container.innerHTML = "";
      langs.forEach(lang => {
        const btn = document.createElement("button");
        btn.innerText = lang.toUpperCase();
        btn.classList.add("lang-btn");
        if (currentLang === lang) btn.style.border = "2px solid var(--primary)";
        btn.addEventListener("click", () => {
          setLanguage(lang);
          document.querySelectorAll(".lang-btn").forEach(b => b.style.border = "1px solid var(--border)");
          btn.style.border = "2px solid var(--primary)";
        });
        container.appendChild(btn);
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      const savedLang = localStorage.getItem("lang");
      if (savedLang && translations[savedLang]) currentLang = savedLang;
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") setTheme("light");
      else setTheme("dark");
      
      buildLangButtons();
      setLanguage(currentLang);  // タイトルも反映
      
      document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
      
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(err => console.log("SW failed:", err));
      }
    });
  </script>
</body>
</html>

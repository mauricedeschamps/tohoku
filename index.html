      padding: 0;

      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    }

    :root {
      --bg: #121212;
      --surface: #1e1e2f;
      --card: #2a2a3b;
      --text: #eeeeee;
      --text-secondary: #bbbbbb;
      --border: #3a3a4a;
      --primary: #5a9eff;
      --primary-hover: #3f7ed0;
      --sponsor-bg: #2a2a2a;
    }

    body.light {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --card: #e9ecef;
      --text: #1e1e2a;
      --text-secondary: #4a5568;
      --border: #cbd5e0;
      --primary: #2b6cb0;
      --primary-hover: #2c5282;
      --sponsor-bg: #edf2f7;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    .app-header, .app-footer {
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
    }

    .app-footer {
      border-top: 1px solid var(--border);
      border-bottom: none;
      text-align: center;
      font-size: 0.9rem;
      margin-top: 2rem;
    }

    .app-footer a {
      color: var(--primary);
      text-decoration: none;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    button, .lang-btn {
      background-color: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }

    button:hover, .lang-btn:hover {
      background-color: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .lang-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    .map-wrapper {
      margin: 1.5rem 0 0.5rem 0;
      border-radius: 1rem;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 300px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .sponsor {
      background-color: var(--sponsor-bg);
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
      border: 1px dashed var(--border);
      font-size: 0.9rem;
    }
    .sponsor p {
      margin: 0.25rem 0;
    }
    .sponsor small {
      color: var(--text-secondary);
    }

    .pref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .pref-card {
      background-color: var(--card);
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .pref-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-color: var(--primary);
    }
    .pref-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .pref-name {
      font-size: 1.3rem;
      font-weight: bold;
    }

    .detail-card {
      background-color: var(--card);
      border-radius: 1rem;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .detail-image {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 1rem;
      margin-bottom: 1rem;
      background: #aaa;
    }
    .back-btn {
      background-color: var(--primary);
      color: white;
      border: none;
      margin-top: 1rem;
      display: inline-block;
    }
    .back-btn:hover {
      background-color: var(--primary-hover);
    }
    .list-item {
      padding: 0.6rem 0;
      border-bottom: 1px dotted var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .list-item:hover {
      background-color: var(--primary);
      color: white;
      padding-left: 0.5rem;
    }
    .official-link {
      display: inline-block;
      margin-top: 0.5rem;
      color: var(--primary);
      word-break: break-all;
    }
    h2, h3 {
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    hr {
      border-color: var(--border);
    }
  </style>
</head>

        ],
        hotsprings: [
          { name: { en: "Ginzan Onsen", it: "Ginzan Onsen", ru: "Гиндзан Онсэн", ja: "銀山温泉" }, description: { en: "Taisho-era romantic townscape.", it: "Paesaggio romantico dell'era Taisho.", ru: "Романтический городок эпохи Тайсё.", ja: "大正ロマンの街並み。" }, url: "https://www.ginzan-onsen.jp/" }
        ],
        access: [
          { name: { en: "Yamagata Shinkansen", it: "Yamagata Shinkansen", ru: "Синкансэн Ямагата", ja: "山形新幹線" }, description: { en: "Tokyo to Yamagata about 2h 40m.", it: "Tokyo a Yamagata circa 2h 40m.", ru: "Токио до Ямагаты около 2 ч 40 м.", ja: "東京から山形まで約2時間40分。" }, url: "https://www.jreast.co.jp/" }
        ]
      },
      fukushima: {
        name: { en: "Fukushima", it: "Fukushima", ru: "Фукусима", ja: "福島県" },
        imgPlaceholder: "https://placehold.co/600x400/8a6a2a/white?text=Fukushima",
        officialPrefUrl: "https://www.tif.ne.jp/",
        attractions: [
          { name: { en: "Tsurugajo Castle", it: "Castello Tsurugajo", ru: "Замок Цуругадзё", ja: "鶴ヶ城" }, description: { en: "Restored castle with red roof tiles.", it: "Castello restaurato con tegole rosse.", ru: "Восстановленный замок с красной черепицей.", ja: "赤瓦の復元天守。" }, url: "https://www.tsurugajo.com/" },
          { name: { en: "Ouchi-juku", it: "Ouchi-juku", ru: "Оути-дзюку", ja: "大内宿" }, description: { en: "Thatched-roof houses post town.", it: "Città di posta con case di paglia.", ru: "Почтовый городок с соломенными крышами.", ja: "茅葺き屋根の宿場町。" }, url: "https://www.ouchi-juku.com/" }
        ],
        festivals: [
          { name: { en: "Fukushima Waraji Matsuri", it: "Fukushima Waraji Matsuri", ru: "Фестиваль Варадзи в Фукусиме", ja: "福島わらじまつり" }, description: { en: "Giant straw sandal parade.", it: "Sfilata di giganteschi sandali di paglia.", ru: "Парад гигантских соломенных сандалий.", ja: "巨大わらじのパレード。" }, url: "https://www.waraji.jp/" }
        ],
        hotsprings: [
          { name: { en: "Iizaka Onsen", it: "Iizaka Onsen", ru: "Иидзака Онсэн", ja: "飯坂温泉" }, description: { en: "One of the Three Famous Hot Springs of Oshu.", it: "Una delle tre famose sorgenti termali di Oshu.", ru: "Один из трех знаменитых источников Осю.", ja: "奥州三名湯の一つ。" }, url: "https://www.iizaka.com/" }
        ],
        access: [
          { name: { en: "Tohoku Shinkansen", it: "Tohoku Shinkansen", ru: "Синкансэн Тохоку", ja: "東北新幹線" }, description: { en: "Tokyo to Fukushima about 1h 20m.", it: "Tokyo a Fukushima circa 1h 20m.", ru: "Токио до Фукусимы около 1 ч 20 м.", ja: "東京から福島まで約1時間20分。" }, url: "https://www.jreast.co.jp/" }
        ]
      }
    };

    // ---------- アプリケーション状態 ----------
    let currentLang = "en";
    let currentTheme = "dark";
    let currentView = "home"; // home, prefDetail, itemDetail
    let currentPrefId = null;
    let currentCategory = null;
    let currentItemIndex = null;

    // テーマ関連
    function setTheme(theme) {
      currentTheme = theme;
      if (theme === "dark") {
        document.body.classList.remove("light");
      } else {
        document.body.classList.add("light");
      }
      localStorage.setItem("theme", theme);
    }

    function toggleTheme() {
      setTheme(currentTheme === "dark" ? "light" : "dark");
    }

    // 言語切替
    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.title = translations[lang].appTitle;
      const titleElem = document.getElementById("app-title");
      if (titleElem) titleElem.innerText = translations[lang].appTitle;
      renderCurrentView();
      updateLangButtonsActive();
    }

    function updateLangButtonsActive() {
      document.querySelectorAll(".lang-btn").forEach(btn => {
        const lang = btn.getAttribute("data-lang");
        if (lang === currentLang) {
          btn.style.border = "2px solid var(--primary)";
        } else {
          btn.style.border = "1px solid var(--border)";
        }
      });
    }

    function renderCurrentView() {
      if (currentView === "home") renderHome();
      else if (currentView === "prefDetail" && currentPrefId) renderPrefDetail();
      else if (currentView === "itemDetail" && currentPrefId && currentCategory && currentItemIndex !== null) renderItemDetail();
      else renderHome();
    }

    function renderHome() {
      const t = translations[currentLang];
      let html = `
        <div class="sponsor">
          <p>✨ ${t.sponsorMsg}</p>
          <small>${t.sponsorNote}</small>
        </div>
        <div class="pref-grid">
      `;
      for (const [id, data] of Object.entries(prefectureData)) {
        const displayName = data.name[currentLang] || data.name.en;
        html += `
          <div class="pref-card" data-pref="${id}">
            <div class="pref-emoji">🗻</div>
            <div class="pref-name">${escapeHtml(displayName)}</div>
          </div>
        `;
      }
      html += `
        </div>
        <div class="sponsor">
          <p>✨ ${t.sponsorMsg}</p>
          <small>${t.sponsorNote}</small>
        </div>
      `;
      document.getElementById("main-content").innerHTML = html;
      
      document.querySelectorAll(".pref-card").forEach(card => {
        card.addEventListener("click", () => {
          currentPrefId = card.getAttribute("data-pref");
          currentView = "prefDetail";
          renderCurrentView();
          window.scrollTo(0, 0);
        });
      });
    }

    function renderPrefDetail() {
      const pref = prefectureData[currentPrefId];
      if (!pref) {
        currentView = "home";
        renderCurrentView();
        return;
      }
      const t = translations[currentLang];
      const prefName = pref.name[currentLang] || pref.name.en;
      
      let html = `
        <div class="sponsor">
          <p>✨ ${t.sponsorMsg}</p>
          <small>${t.sponsorNote}</small>
        </div>
        <div class="detail-card">
          <img src="${pref.imgPlaceholder}" alt="${escapeHtml(prefName)}" class="detail-image">
          <h2>${escapeHtml(prefName)}</h2>
      `;
      
      html += `<h3>📌 ${t.attractions}</h3>`;
      if (pref.attractions && pref.attractions.length) {
        pref.attractions.forEach((item, idx) => {
          const itemName = item.name[currentLang] || item.name.en;
          html += `<div class="list-item" data-cat="attractions" data-idx="${idx}">${escapeHtml(itemName)}</div>`;
        });
      } else { html += `<div class="list-item">No data</div>`; }
      
      html += `<h3>🎎 ${t.festivals}</h3>`;
      if (pref.festivals && pref.festivals.length) {
        pref.festivals.forEach((item, idx) => {
          const itemName = item.name[currentLang] || item.name.en;
          html += `<div class="list-item" data-cat="festivals" data-idx="${idx}">${escapeHtml(itemName)}</div>`;
        });
      } else { html += `<div class="list-item">No data</div>`; }
      
      html += `<h3>♨️ ${t.hotsprings}</h3>`;
      if (pref.hotsprings && pref.hotsprings.length) {
        pref.hotsprings.forEach((item, idx) => {
          const itemName = item.name[currentLang] || item.name.en;
          html += `<div class="list-item" data-cat="hotsprings" data-idx="${idx}">${escapeHtml(itemName)}</div>`;
        });
      } else { html += `<div class="list-item">No data</div>`; }
      
      html += `<h3>🚗 ${t.access}</h3>`;
      if (pref.access && pref.access.length) {
        pref.access.forEach((item, idx) => {
          const itemName = item.name[currentLang] || item.name.en;
          html += `<div class="list-item" data-cat="access" data-idx="${idx}">${escapeHtml(itemName)}</div>`;
        });
      } else { html += `<div class="list-item">No data</div>`; }
      
      html += `<h3>🔗 ${t.officialSite}</h3>`;
      html += `<a href="${pref.officialPrefUrl}" target="_blank" rel="noopener" class="official-link">${escapeHtml(pref.officialPrefUrl)}</a>`;
      html += `<div><button class="back-btn" id="back-home-btn">${t.back}</button></div>`;
      html += `</div>`;
      html += `<div class="sponsor"><p>✨ ${t.sponsorMsg}</p><small>${t.sponsorNote}</small></div>`;
      
      document.getElementById("main-content").innerHTML = html;
      
      document.querySelectorAll(".list-item").forEach(el => {
        el.addEventListener("click", () => {
          currentCategory = el.getAttribute("data-cat");
          currentItemIndex = parseInt(el.getAttribute("data-idx"));
          currentView = "itemDetail";
          renderCurrentView();
          window.scrollTo(0, 0);
        });
      });
      
      const backBtn = document.getElementById("back-home-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          currentView = "home";
          currentPrefId = null;
          renderCurrentView();
        });
      }
    }
    
    function renderItemDetail() {
      const pref = prefectureData[currentPrefId];
      if (!pref) { currentView = "home"; renderCurrentView(); return; }
      const categoryData = pref[currentCategory];
      if (!categoryData || currentItemIndex < 0 || currentItemIndex >= categoryData.length) {
        currentView = "prefDetail";
        renderCurrentView();
        return;
      }
      const item = categoryData[currentItemIndex];
      const t = translations[currentLang];
      const itemName = item.name[currentLang] || item.name.en;
      const itemDesc = item.description ? (item.description[currentLang] || item.description.en) : "No detailed description available.";
      const itemUrl = item.url || "#";
      
      let html = `
        <div class="sponsor">
          <p>✨ ${t.sponsorMsg}</p>
          <small>${t.sponsorNote}</small>
        </div>
        <div class="detail-card">
          <h2>${escapeHtml(itemName)}</h2>
          <p><strong>${t.detailInfo}:</strong> ${escapeHtml(itemDesc)}</p>
          <h3>🔗 ${t.officialLink}</h3>
          <a href="${itemUrl}" target="_blank" rel="noopener" class="official-link">${escapeHtml(itemUrl)}</a>
          <div><button class="back-btn" id="back-to-pref-btn">${t.closeDetail}</button></div>
        </div>
        <div class="sponsor">
          <p>✨ ${t.sponsorMsg}</p>
          <small>${t.sponsorNote}</small>
        </div>
      `;
      document.getElementById("main-content").innerHTML = html;
      
      const backBtn = document.getElementById("back-to-pref-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          currentView = "prefDetail";
          renderCurrentView();
        });
      }
    }
    
    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    function buildLangButtons() {
      const langs = ["en", "it", "ru", "ja"];
      const container = document.getElementById("lang-group");
      if (!container) return;
      container.innerHTML = "";
      langs.forEach(lang => {
        const btn = document.createElement("button");
        btn.classList.add("lang-btn");
        btn.setAttribute("data-lang", lang);
        const flag = flagIcons[lang];
        btn.innerText = `${flag} ${lang.toUpperCase()}`;
        btn.addEventListener("click", () => setLanguage(lang));
        container.appendChild(btn);
      });
      updateLangButtonsActive();
    }
    
    window.addEventListener("DOMContentLoaded", () => {
      const savedLang = localStorage.getItem("lang");
      if (savedLang && translations[savedLang]) currentLang = savedLang;
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") setTheme("light");
      else setTheme("dark");
      
      buildLangButtons();
      setLanguage(currentLang);
      
      const themeToggle = document.getElementById("theme-toggle");
      if (themeToggle) themeToggle.addEventListener("click", toggleTheme);
      
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(err => console.log("SW registration failed:", err));
      }
    });
  </script>
</body>
</html>
